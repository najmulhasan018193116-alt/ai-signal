<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f4f7; margin: 0; text-align: center; }
        .header { background: linear-gradient(135deg, #007bff, #00d4ff); color: white; padding: 40px 20px; border-radius: 0 0 25px 25px; }
        .balance-card { background: white; width: 85%; margin: -30px auto 20px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .menu-item i { font-size: 25px; color: #007bff; margin-bottom: 10px; }
        .btn-logout { background: #ff4757; color: white; border: none; padding: 12px 40px; border-radius: 25px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>স্বাগতম!</h2>
    <p id="userPhoneDisplay">ফোন নম্বর লোড হচ্ছে...</p>
</div>

<div class="balance-card">
    <p style="color: #888; margin: 0;">আপনার ব্যালেন্স</p>
    <h1 style="margin: 10px 0;">৳ <span id="balance">0.00</span></h1>
</div>

<div class="menu-grid">
    <div class="menu-item"><i class="fas fa-plus-circle"></i><br>Deposit</div>
    <div class="menu-item"><i class="fas fa-minus-circle"></i><br>Withdraw</div>
    <div class="menu-item"><i class="fas fa-user"></i><br>Profile</div>
    <div class="menu-item"><i class="fas fa-headset"></i><br>Support</div>
</div>

<button class="btn-logout" onclick="logout()">Logout</button>

<script>
    window.onload = function() {
        const loginStatus = localStorage.getItem("isLoggedIn");
        const userPhone = localStorage.getItem("loggedUser");

        // যদি লগইন ডাটা না থাকে তবে লগইন পেজে পাঠিয়ে দিবে
        if (loginStatus !== "true" || !userPhone) {
            window.location.replace("index.html");
        } else {
            document.getElementById("userPhoneDisplay").innerText = "অ্যাকাউন্ট: " + userPhone;
        }
    };

    function logout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>

</body>
</html>
