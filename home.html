<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Gaming Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* আপনার দেওয়া সব স্টাইল এখানে থাকবে (পরিবর্তন করার প্রয়োজন নেই) */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #00ff6a; min-height: 100vh; overflow-x: hidden; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
    .header-btn { color: white; text-decoration: none; font-size: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; transition: 0.3s; }
    .container { width: 100%; padding: 0 20px 100px 20px; }
    .slider-container { width: 100%; height: 180px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin: 15px 0; }
    .slider { display: flex; width: 300%; height: 100%; animation: slide 10s infinite; }
    .slider img { width: 33.33%; height: 100%; object-fit: cover; }
    @keyframes slide { 0% { transform: translateX(0); } 30% { transform: translateX(0); } 33% { transform: translateX(-33.33%); } 63% { transform: translateX(-33.33%); } 66% { transform: translateX(-66.66%); } 96% { transform: translateX(-66.66%); } 100% { transform: translateX(0); } }
    .notice-board { background: rgba(0, 0, 0, 0.2); color: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .notice-board marquee { flex: 1; font-weight: 500; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
    .game-btn { height:110px; border-radius:20px; display:flex; flex-direction: column; align-items:center; justify-content:center; font-size:18px; font-weight:bold; color:white; text-decoration: none; box-shadow:0 8px 15px rgba(0,0,0,0.2); text-align: center; transition: 0.2s; border: 2px solid rgba(255,255,255,0.1); }
    .game-btn i { font-size: 30px; margin-bottom: 8px; }
    .lottery { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
    .head { background: linear-gradient(135deg, #fce38a, #f38181); color: #333; }
    .big { background: linear-gradient(135deg, #f09819, #edde5d); }
    .redgreen { background: linear-gradient(135deg, #38ef7d, #11998e); }
    .mlm-container { margin-top: 25px; display: flex; justify-content: center; }
    .mlm-btn { width: 100%; height: 75px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; text-decoration: none; box-shadow: 0 10px 25px rgba(37, 117, 252, 0.5); border: 2px solid rgba(255,255,255,0.3); transition: 0.3s; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 10px 0; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
    .nav-item { text-align: center; color: #888; text-decoration: none; flex: 1; transition: 0.3s; }
    .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    .nav-item span { font-size: 12px; font-weight: 600; }
    .nav-item.active { color: #00c853; }
</style>
</head>

<body>

    <div class="header">
        <a href="alarm.html" class="header-btn">
            <i class="fas fa-bell"></i> Alarm
        </a>
        <a href="download.html" class="header-btn">
            <i class="fas fa-download"></i> Download
        </a>
    </div>

    <div class="container">
        <div class="slider-container">
            <div class="slider">
                <img src="https://images.livemint.com/img/2022/07/20/1600x900/ipl_games_1658309590673_1658309590827_1658309590827.jpg" alt="Slide 1">
                <img src="https://img.freepik.com/premium-photo/mythical-dragon-is-swimming-deep-sea_908344-7772.jpg" alt="Slide 2">
                <img src="https://img.freepik.com/free-photo/view-gaming-controllers_23-2150821931.jpg" alt="Slide 3">
            </div>
        </div>

        <div class="notice-board">
            <i class="fas fa-volume-up"></i>
            <marquee id="dynamicNotice">আমাদের গেমিং প্ল্যাটফর্মে আপনাকে স্বাগতম! লগইন করার জন্য ধন্যবাদ।</marquee>
        </div>

        <div class="grid">
            <a href="lottery.html" class="game-btn lottery"><i class="fas fa-ticket-alt"></i> Lottery</a>
            <a href="head-tell.html" class="game-btn head"><i class="fas fa-coins"></i> Head Tell</a>
            <a href="big-small.html" class="game-btn big"><i class="fas fa-chart-line"></i> Big Small</a>
            <a href="red-green.html" class="game-btn redgreen"><i class="fas fa-palette"></i> Red Green</a>
        </div>

        <div class="mlm-container">
            <a href="mlm.html" class="mlm-btn"><i class="fas fa-users" style="margin-right: 10px;"></i> MLM SYSTEM</a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="activity.html" class="nav-item"><i class="fas fa-bolt"></i><span>Activity</span></a>
        <a href="promotion.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Promotion</span></a>
        <a href="account.html" class="nav-item"><i class="fas fa-user-gear"></i><span>Account</span></a>
    </div>

    <script>
        window.onload = function() {
            // ১. চেক করা হচ্ছে ইউজার লগইন করা কি না
            const isLoggedIn = localStorage.getItem("isLoggedIn");
            const loggedUser = localStorage.getItem("loggedUser");

            if (isLoggedIn !== "true" || !loggedUser) {
                // ২. যদি লগইন না থাকে, তবে index.html (লগইন পেজে) পাঠিয়ে দেবে
                alert("Security Alert: Please login first!");
                window.location.replace("index.html");
            } else {
                console.log("Welcome back, " + loggedUser);
                // ৩. নোটিশ বোর্ডে ইউজারের নম্বর দেখানো (ঐচ্ছিক)
                document.getElementById("dynamicNotice").innerText = "স্বাগতম " + loggedUser + "! আমাদের গেমিং প্ল্যাটফর্মে আজই গেম খেলুন।";
            }
        };

        // ৪. লগআউট করার ফাংশন (প্রয়োজন হলে Account পেজে ব্যবহার করবেন)
        function logout() {
            localStorage.clear();
            window.location.replace("index.html");
        }
    </script>

</body>
</html>
