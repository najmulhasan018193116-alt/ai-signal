<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login & Register</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#4facfe,#00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin:0;
    }
    .container {
        width: 350px;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }
    .logo { font-size: 50px; margin-bottom: 10px; }
    .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; }
    .tabs button {
        background: none; border: none; font-size: 16px;
        cursor: pointer; font-weight: bold; color: #555;
        padding: 5px 10px; border-bottom: 2px solid transparent;
    }
    .tabs button.active { border-bottom: 2px solid #e52e71; color: #e52e71; }
    input {
        width: 100%; padding: 12px; margin: 8px 0;
        border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;
    }
    button.main {
        width: 100%; padding: 12px; border: none; border-radius: 25px;
        background: linear-gradient(90deg,#ff8a00,#e52e71);
        color: white; font-size: 16px; cursor: pointer; margin-top: 10px;
    }
    .hidden { display: none; }
    p { cursor: pointer; color: #ff8a00; margin-top: 15px; font-size: 14px; }
    #recaptcha-container { margin: 10px 0; }
</style>
</head>
<body>

<div class="container">
    <div class="logo">🔐</div>
    <h2 id="pageTitle">Secure Login</h2>

    <div class="tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="regTab" onclick="showRegister()">Register</button>
    </div>

    <div id="loginPage">
        <input type="text" id="loginPhone" placeholder="Phone (e.g. 01712xxxxxx)">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="main" onclick="loginUser()">Login</button>
        <p onclick="showReset()">Forgot password?</p>
    </div>

    <div id="registerPage" class="hidden">
        <input type="text" id="regPhone" placeholder="Phone number">
        <input type="password" id="regPass" placeholder="New Password">
        <input type="password" id="regConfirm" placeholder="Confirm Password">
        <input type="text" id="refCode" placeholder="Referral Code">
        <label style="font-size: 12px;">
            <input type="checkbox" id="agree"> I agree to privacy policy
        </label>
        <button class="main" onclick="registerUser()">Register</button>
    </div>

    <div id="resetPage" class="hidden">
        <input type="text" id="resetPhone" placeholder="Registered Phone">
        <div id="recaptcha-container"></div>
        <button class="main" onclick="sendOTP()">Send OTP</button>
        <hr>
        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP">
        <input type="password" id="newPass" placeholder="Set New Password">
        <button class="main" onclick="resetPassword()">Update Password</button>
        <p onclick="showLogin()">Back to Login</p>
    </div>
</div>

<script type="module">
    // প্রয়োজনীয় Firebase লাইব্রেরি এবং Firestore ইমপোর্ট করা হয়েছে
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
      authDomain: "ai-signal-75e73.firebaseapp.com",
      projectId: "ai-signal-75e73",
      storageBucket: "ai-signal-75e73.firebasestorage.app",
      messagingSenderId: "610985325221",
      appId: "1:610985325221:web:09032de2788a18a6ae534c",
      measurementId: "G-8S74TM917W"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // Firestore Initialize

    let confirmationResult;

    window.onload = function() {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal',
            'callback': (response) => { console.log("Captcha solved"); }
        });
    };

    window.showRegister = function() {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("registerPage").classList.remove("hidden");
        document.getElementById("resetPage").classList.add("hidden");
        document.getElementById("pageTitle").innerText = "Create Account";
    }

    window.showLogin = function() {
        document.getElementById("loginPage").classList.remove("hidden");
        document.getElementById("registerPage").classList.add("hidden");
        document.getElementById("resetPage").classList.add("hidden");
        document.getElementById("pageTitle").innerText = "Secure Login";
    }

    window.showReset = function() {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("registerPage").classList.add("hidden");
        document.getElementById("resetPage").classList.remove("hidden");
        document.getElementById("pageTitle").innerText = "Reset Password";
    }

    // --- Firestore এ রেজিস্ট্রেশন করার লজিক ---
    window.registerUser = async function() {
        let phone = document.getElementById("regPhone").value.trim();
        let pass = document.getElementById("regPass").value;
        let confirm = document.getElementById("regConfirm").value;
        let ref = document.getElementById("refCode").value;
        let agree = document.getElementById("agree").checked;

        if(phone.length < 11) { alert("Invalid Phone Number"); return; }
        if(pass !== confirm) { alert("Passwords do not match"); return; }
        if(!agree) { alert("Please agree to privacy policy"); return; }

        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                alert("This phone number is already registered!");
                return;
            }

            // Firebase Firestore-এ ডাটা সেভ করা হচ্ছে
            await setDoc(userRef, {
                phone: phone,
                pass: pass,
                referralCode: ref,
                createdAt: new Date()
            });

            alert("Registration Successful in Firebase!");
            showLogin();
        } catch (e) {
            alert("Error: " + e.message);
        }
    }

    // --- Firestore থেকে লগইন চেক করার লজিক ---
    window.loginUser = async function() {
        let phone = document.getElementById("loginPhone").value.trim();
        let pass = document.getElementById("loginPass").value;
        
        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const userData = userSnap.data();
                if(userData.pass === pass) {
                    alert("Login Successful!");
                    window.location.href = "home.html";
                } else {
                    alert("Wrong Password!");
                }
            } else {
                alert("User not found in Database!");
            }
        } catch (e) {
            alert("Database Error: " + e.message);
        }
    }

    window.sendOTP = function() {
        let phoneField = document.getElementById("resetPhone").value.trim();
        if(!phoneField) { alert("Enter phone number first"); return; }
        const phoneNumber = "+88" + phoneField;
        const appVerifier = window.recaptchaVerifier;

        signInWithPhoneNumber(auth, phoneNumber, appVerifier)
            .then((result) => {
                confirmationResult = result;
                alert("OTP Sent to " + phoneNumber);
            }).catch((error) => {
                alert("Error: " + error.message);
                if(window.recaptchaVerifier) window.recaptchaVerifier.render();
            });
    }

    // --- পাসওয়ার্ড রিসেট করে Firestore-এ আপডেট করা ---
    window.resetPassword = function() {
        const code = document.getElementById("otpInput").value.trim();
        const newPass = document.getElementById("newPass").value;
        const phone = document.getElementById("resetPhone").value.trim();

        if(!confirmationResult) { alert("Please send OTP first"); return; }
        if(newPass.length < 4) { alert("Password too short"); return; }

        confirmationResult.confirm(code).then(async () => {
            try {
                const userRef = doc(db, "users", phone);
                await updateDoc(userRef, { pass: newPass });
                alert("Password Updated in Firebase Database!");
                showLogin();
            } catch (e) {
                alert("Error updating password: " + e.message);
            }
        }).catch(() => {
            alert("Invalid OTP Code");
        });
    }
</script>
</body>
</html>
