<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login & Register</title>
<style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#4facfe,#00f2fe); display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
    .container { width: 350px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
    .logo { font-size: 50px; margin-bottom: 10px; }
    .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; }
    .tabs button { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: bold; color: #555; padding: 5px 10px; border-bottom: 2px solid transparent; }
    .tabs button.active { border-bottom: 2px solid #e52e71; color: #e52e71; }
    
    .input-group { position: relative; width: 100%; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .toggle-pass { position: absolute; right: 10px; top: 18px; cursor: pointer; color: #777; font-size: 18px; }

    button.main { width: 100%; padding: 12px; border: none; border-radius: 25px; background: linear-gradient(90deg,#ff8a00,#e52e71); color: white; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .hidden { display: none; }
    p { cursor: pointer; color: #ff8a00; margin-top: 15px; font-size: 14px; }
    #recaptcha-container { margin: 10px 0; }
</style>
</head>
<body>

<div class="container">
    <div class="logo">🔐</div>
    <h2 id="pageTitle">Secure Login</h2>

    <div class="tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="regTab" onclick="showRegister()">Register</button>
    </div>

    <div id="loginPage">
        <input type="text" id="loginPhone" placeholder="Phone (e.g. 01712xxxxxx)">
        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password">
            <span class="toggle-pass" onclick="togglePass('loginPass')">👁️</span>
        </div>
        <button class="main" onclick="loginUser()">Login</button>
        <p onclick="showReset()">Forgot password?</p>
    </div>

    <div id="registerPage" class="hidden">
        <input type="text" id="regPhone" placeholder="Phone number">
        <div class="input-group">
            <input type="password" id="regPass" placeholder="New Password">
            <span class="toggle-pass" onclick="togglePass('regPass')">👁️</span>
        </div>
        <input type="password" id="regConfirm" placeholder="Confirm Password">
        <input type="text" id="refCode" placeholder="Referral Code">
        <label style="font-size: 12px;">
            <input type="checkbox" id="agree"> I agree to privacy policy
        </label>
        <button class="main" onclick="registerUser()">Register</button>
    </div>

    <div id="resetPage" class="hidden">
        <input type="text" id="resetPhone" placeholder="Registered Phone">
        <div id="recaptcha-container"></div>
        <button class="main" onclick="sendOTP()">Send OTP</button>
        <hr>
        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP">
        <input type="password" id="newPass" placeholder="Set New Password">
        <button class="main" onclick="resetPassword()">Update Password</button>
        <p onclick="showLogin()">Back to Login</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // আপনার Firebase কনফিগারেশন
    const firebaseConfig = {
      apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
      authDomain: "ai-signal-75e73.firebaseapp.com",
      projectId: "ai-signal-75e73",
      databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com",
      storageBucket: "ai-signal-75e73.firebasestorage.app",
      messagingSenderId: "610985325221",
      appId: "1:610985325221:web:09032de2788a18a6ae534c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let confirmationResult;

    window.onload = function() {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal'
        });
    };

    window.togglePass = function(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    window.showRegister = function() {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("registerPage").classList.remove("hidden");
        document.getElementById("resetPage").classList.add("hidden");
        document.getElementById("pageTitle").innerText = "Create Account";
        document.getElementById("regTab").classList.add("active");
        document.getElementById("loginTab").classList.remove("active");
    }

    window.showLogin = function() {
        document.getElementById("loginPage").classList.remove("hidden");
        document.getElementById("registerPage").classList.add("hidden");
        document.getElementById("resetPage").classList.add("hidden");
        document.getElementById("pageTitle").innerText = "Secure Login";
        document.getElementById("loginTab").classList.add("active");
        document.getElementById("regTab").classList.remove("active");
    }

    window.loginUser = async function() {
        let phone = document.getElementById("loginPhone").value.trim();
        let pass = document.getElementById("loginPass").value;
        
        try {
            const userRef = ref(db, "users/" + phone);
            const snapshot = await get(userRef);

            if (snapshot.exists() && snapshot.val().pass === pass) {
                alert("Login Successful!");
                
                // --- MLM SYSTEM এর জন্য লোকাল স্টোরেজ আপডেট ---
                localStorage.setItem("userPhone", phone); 
                localStorage.setItem("isLoggedIn", "true");
                
                // আপনার ড্যাশবোর্ড পেজ (যদি home.html হয়)
                window.location.replace("home.html"); 
            } else { 
                alert("Incorrect Phone or Password"); 
            }
        } catch (e) { alert("Database Error: " + e.message); }
    }

    // রেজিস্ট্রেশন এবং পাসওয়ার্ড রিসেট ফাংশনগুলো অপরিবর্তিত রাখা হয়েছে...
    window.registerUser = async function() {
        let phone = document.getElementById("regPhone").value.trim();
        let pass = document.getElementById("regPass").value;
        let confirm = document.getElementById("regConfirm").value;
        if(phone.length < 11) { alert("Invalid Phone"); return; }
        if(pass !== confirm) { alert("Mismatch!"); return; }

        try {
            const userRef = ref(db, "users/" + phone);
            await set(userRef, { phone, pass, balance: 0, createdAt: new Date().toISOString() });
            alert("Registered!"); showLogin();
        } catch (e) { alert(e.message); }
    }
</script>
</body>
    </html>
