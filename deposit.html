<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Money</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; padding-bottom: 30px; }
        .header {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            padding: 20px; color: white; display: flex; align-items: center; gap: 15px;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
        }
        .header a { color: white; text-decoration: none; }
        .container { padding: 20px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .method-card {
            background: white; padding: 15px 10px; border-radius: 15px; text-align: center;
            border: 2px solid transparent; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .method-card img { width: 50px; height: 50px; margin-bottom: 8px; object-fit: contain; }
        .method-card.active { border-color: #00b09b; background: #e0fff9; }
        .input-group { background: white; padding: 20px; border-radius: 20px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
        .input-box input {
            width: 100%; padding: 12px 15px; border: 1px solid #eee; border-radius: 10px; outline: none;
        }
        .amount-chips { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .chip { padding: 8px 15px; background: #eee; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #00b09b, #96c93d); color: white;
            border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="account.html"><i class="fas fa-arrow-left"></i></a>
        <h2>Deposit Money</h2>
    </div>

    <div class="container">
        <p class="section-title">পেমেন্ট মেথড সিলেক্ট করুন</p>
        <div class="methods">
            <div class="method-card active" onclick="selectMethod(this, 'bKash')">
                <img src="https://itshamsul.com/wp-content/uploads/2024/02/bkash-logo-circle.png" alt="bKash">
                <p>bKash</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'Nagad')">
                <img src="https://freelogopng.com/images/all_img/1679248787nagad-logo-png.png" alt="Nagad">
                <p>Nagad</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'Rocket')">
                <img src="https://seeklogo.com/images/D/dutch-bangla-rocket-logo-B4D1CC458D-seeklogo.com.png" alt="Rocket">
                <p>Rocket</p>
            </div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <label>ডিপোজিট পরিমাণ (৳)</label>
                <input type="number" id="amountInput" placeholder="সর্বনিম্ন ৫০০ টাকা">
                <div class="amount-chips">
                    <span class="chip" onclick="setAmount(500)">৳৫০০</span>
                    <span class="chip" onclick="setAmount(1000)">৳১০০০</span>
                    <span class="chip" onclick="setAmount(5000)">৳৫০০০</span>
                </div>
            </div>

            <div class="input-box">
                <label>আপনার মেথড নম্বর (বিকাশ/নগদ নম্বর)</label>
                <input type="number" id="userNumber" placeholder="যে নম্বর থেকে টাকা পাঠাবেন">
            </div>

            <button class="submit-btn" onclick="goToPayment()">Submit</button>
        </div>
    </div>

    <script>
        let selectedMethod = "bKash";

        function selectMethod(element, method) {
            document.querySelectorAll('.method-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            selectedMethod = method;
        }

        function setAmount(val) { document.getElementById('amountInput').value = val; }

        function goToPayment() {
            const amt = document.getElementById('amountInput').value;
            const num = document.getElementById('userNumber').value;

            if(amt < 500 || num.length < 11) {
                alert("সঠিক তথ্য দিন। সর্বনিম্ন ৫০০ টাকা।");
                return;
            }

            // তথ্যগুলো সেভ করে পরের পেজে পাঠানো
            localStorage.setItem("dep_amt", amt);
            localStorage.setItem("dep_method", selectedMethod);
            localStorage.setItem("user_num", num);
            
            window.location.href = "payment_details.html";
        }
    </script>
</body>
</html>
