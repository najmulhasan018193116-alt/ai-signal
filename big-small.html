<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX Win Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dx-yellow: #ffc107; --dx-light-bg: #f5f5f5; --big-color: #ff9800; --small-color: #2196f3; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--dx-light-bg); }

        /* Header Style Like Image */
        .top-header { background: var(--dx-yellow); padding: 15px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; position: relative; }
        .top-header img { width: 100px; }
        .balance-card { background: #fff; margin: -20px 20px 10px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .balance-card p { color: #666; font-size: 14px; }
        .balance-card h2 { font-size: 28px; color: #333; margin-top: 5px; }

        /* Tabs like WinGo */
        .game-modes { display: flex; justify-content: space-around; background: #fff; margin: 10px; border-radius: 15px; padding: 10px; }
        .mode-item { text-align: center; cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.3s; flex: 1; }
        .mode-item.active { background: var(--dx-yellow); font-weight: bold; }
        .mode-item i { display: block; font-size: 20px; margin-bottom: 5px; color: #555; }

        /* Timer Section */
        .timer-section { background: #fff; margin: 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--dx-yellow); }
        .period-info h4 { font-size: 18px; color: #444; }
        .timer-display h3 { font-size: 32px; color: #333; font-family: 'Courier New', monospace; }

        /* Big/Small Buttons */
        .action-btns { display: flex; gap: 15px; padding: 15px; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-big { background: var(--big-color); box-shadow: 0 4px 0 #e68a00; }
        .btn-small { background: var(--small-color); box-shadow: 0 4px 0 #1976d2; }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Table & Results */
        .history-container { background: #fff; margin: 10px; border-radius: 15px; overflow: hidden; padding-bottom: 10px; }
        .history-tabs { display: flex; border-bottom: 1px solid #eee; }
        .h-tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; cursor: pointer; color: #888; }
        .h-tab.active { color: #333; border-bottom: 3px solid var(--dx-yellow); font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #fffde7; padding: 12px; font-size: 13px; color: #666; text-align: center; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .num-ball { width: 25px; height: 25px; border-radius: 50%; display: inline-block; color: #fff; line-height: 25px; font-weight: bold; }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px; }
        .pg-btn { background: var(--dx-yellow); width: 35px; height: 35px; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; }

        /* Floating Button for MY */
        .my-fab { position: fixed; right: 0; top: 55%; background: var(--dx-yellow); padding: 15px 8px; border-radius: 15px 0 0 15px; font-weight: bold; cursor: pointer; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 100; writing-mode: vertical-rl; }

        /* Side Panel */
        .side-panel { position: fixed; right: -100%; top: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; transition: 0.4s; padding: 20px; }
        .side-panel.open { right: 0; }

        /* Custom Bet Modal */
        .bet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .bet-card { background: #fff; width: 90%; border-radius: 20px; padding: 25px; text-align: center; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .bet-card input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; font-size: 20px; text-align: center; }
        
        /* Result Popup Message */
        .res-popup { display: none; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); padding: 20px 50px; border-radius: 50px; z-index: 3000; font-size: 24px; font-weight: bold; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        #waitMessage { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.8); z-index:10; border-radius:10px; align-items:center; justify-content:center; color:red; font-weight:bold; }
    </style>
</head>
<body>

    <div id="statusPopup" class="res-popup"></div>

    <div class="top-header">
        <h2 style="color: white; letter-spacing: 2px;">DX WIN</h2>
    </div>

    <div class="balance-card">
        <p>Wallet Balance</p>
        <h2>৳ <span id="balance">0.00</span></h2>
    </div>

    <div class="game-modes">
        <div class="mode-item active" onclick="setMode(30)"><i class="fas fa-clock"></i>30s</div>
        <div class="mode-item" onclick="setMode(60)"><i class="fas fa-history"></i>1m</div>
        <div class="mode-item" onclick="setMode(180)"><i class="fas fa-hourglass-half"></i>3m</div>
        <div class="mode-item" onclick="setMode(300)"><i class="fas fa-hourglass-end"></i>5m</div>
    </div>

    <div class="timer-section">
        <div class="period-info">
            <p style="color: #999; font-size: 12px;">Period ID</p>
            <h4 id="periodId">20260307...</h4>
        </div>
        <div class="timer-display">
            <p style="color: #999; font-size: 12px; text-align: right;">Time Left</p>
            <h3 id="timer">00:00</h3>
        </div>
    </div>

    <div class="action-btns" style="position: relative;">
        <div id="waitMessage">BETTING CLOSED</div>
        <button class="action-btn btn-big" onclick="openBet('Big')">Big</button>
        <button class="action-btn btn-small" onclick="openBet('Small')">Small</button>
    </div>

    <div class="history-container">
        <div class="history-tabs">
            <div class="h-tab active">Game history</div>
            <div class="h-tab" onclick="toggleSidePanel()">My history</div>
        </div>
        <table>
            <thead>
                <tr><th>Period</th><th>Number</th><th>Big Small</th></tr>
            </thead>
            <tbody id="gameHistoryBody"></tbody>
        </table>
        
        <div class="pagination">
            <div class="pg-btn" onclick="movePage(-1)"><i class="fas fa-chevron-left"></i></div>
            <span id="pgNum" style="font-weight: bold;">1 / 1</span>
            <div class="pg-btn" onclick="movePage(1)"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>

    <div class="my-fab" onclick="toggleSidePanel()">MY HISTORY</div>

    <div class="bet-overlay" id="betModal">
        <div class="bet-card">
            <h3 id="betTitle">Bet on Big</h3>
            <input type="number" id="betInput" value="100" min="10">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal()" style="flex: 1; padding: 15px; border-radius: 10px; border: none; background: #eee;">Cancel</button>
                <button onclick="confirmBet()" style="flex: 1; padding: 15px; border-radius: 10px; border: none; background: var(--dx-yellow); font-weight: bold;">Confirm</button>
            </div>
        </div>
    </div>

    <div class="side-panel" id="sidePanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>My Betting History</h3>
            <i class="fas fa-times" onclick="toggleSidePanel()" style="font-size: 24px; color: red; cursor: pointer;"></i>
        </div>
        <div style="overflow-y: auto; height: 85%;">
            <table>
                <thead>
                    <tr><th>Period</th><th>Pick</th><th>Amount</th><th>Status</th></tr>
                </thead>
                <tbody id="myHistoryBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem("userPhone") || "guest_user";

        let currentMode = 30;
        let selectedChoice = "";
        let currentPage = 1;
        let fullHistory = [];

        // UI Functions
        function toggleSidePanel() { document.getElementById('sidePanel').classList.toggle('open'); }
        function openBet(choice) {
            selectedChoice = choice;
            document.getElementById('betTitle').innerText = "Bet on " + choice;
            document.getElementById('betModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('betModal').style.display = 'none'; }

        // Sync Balance
        db.ref('users/' + user + '/balance').on('value', s => {
            document.getElementById('balance').innerText = parseFloat(s.val() || 0).toFixed(2);
        });

        function confirmBet() {
            const amt = parseFloat(document.getElementById('betInput').value);
            const bal = parseFloat(document.getElementById('balance').innerText);
            if (amt > bal || amt < 10) return alert("Low balance or minimum bet 10");

            const pid = document.getElementById('periodId').innerText;
            db.ref('users/' + user).update({ balance: bal - amt });
            db.ref('user_bets/' + user).push({
                period: pid, amount: amt, choice: selectedChoice, mode: currentMode, status: "Pending"
            });
            closeModal();
        }

        function updateClock() {
            const now = new Date();
            const sec = (now.getMinutes() * 60) + now.getSeconds();
            const remain = currentMode - (sec % currentMode);
            
            // Format Period ID: YYYYMMDD + Mode + Index
            const dateStr = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
            const pid = dateStr + currentMode + Math.floor(sec / currentMode).toString().padStart(4, '0');
            
            document.getElementById('periodId').innerText = pid;
            document.getElementById('timer').innerText = `00:${remain.toString().padStart(2, '0')}`;
            document.getElementById('waitMessage').style.display = (remain <= 5) ? 'flex' : 'none';

            if (remain === currentMode) {
                const prevIndex = Math.floor(sec / currentMode) - 1;
                const prevPid = dateStr + currentMode + prevIndex.toString().padStart(4, '0');
                generateGameResult(prevPid);
            }
        }

        function generateGameResult(pid) {
            const num = Math.floor(Math.random() * 10);
            const size = (num >= 5) ? "Big" : "Small";
            db.ref('history/' + currentMode + '/' + pid).set({ num, size });

            // Settle bets for this period
            db.ref('user_bets/' + user).orderByChild('period').equalTo(pid).once('value', s => {
                s.forEach(child => {
                    const bet = child.val();
                    if(bet.status === "Pending" && bet.mode == currentMode) {
                        let isWin = (bet.choice === size);
                        if(isWin) {
                            // 2% service charge logic (Win = 1.96x of bet)
                            const winProfit = bet.amount * 0.98; 
                            const totalReturn = bet.amount + winProfit;
                            db.ref('users/' + user + '/balance').transaction(b => (b || 0) + totalReturn);
                            showStatus("WINNER! ৳" + totalReturn.toFixed(2), "#4caf50");
                        } else {
                            showStatus("LOSS", "#f44336");
                        }
                        db.ref('user_bets/' + user + '/' + child.key).update({ status: isWin ? "Win" : "Loss" });
                    }
                });
            });
        }

        function showStatus(msg, bg) {
            const p = document.getElementById('statusPopup');
            p.innerText = msg; p.style.backgroundColor = bg; p.style.display = 'block';
            setTimeout(() => p.style.display = 'none', 3000);
        }

        function setMode(m) {
            currentMode = m; currentPage = 1;
            document.querySelectorAll('.mode-item').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadRealtimeData();
        }

        function loadRealtimeData() {
            // Game History Table
            db.ref('history/' + currentMode).on('value', s => {
                fullHistory = [];
                s.forEach(c => fullHistory.push({id: c.key, ...c.val()}));
                fullHistory.reverse();
                renderTable();
            });

            // My History Table
            db.ref('user_bets/' + user).on('value', s => {
                const body = document.getElementById('myHistoryBody');
                body.innerHTML = "";
                let rows = [];
                s.forEach(c => rows.push(c.val()));
                rows.reverse().forEach(d => {
                    if(d.mode == currentMode) {
                        const sColor = d.status == 'Win' ? 'green' : (d.status == 'Loss' ? 'red' : 'orange');
                        body.innerHTML += `<tr><td>...${d.period.slice(-4)}</td><td>${d.choice}</td><td>${d.amount}</td><td style="color:${sColor}; font-weight:bold;">${d.status}</td></tr>`;
                    }
                });
            });
        }

        function renderTable() {
            const body = document.getElementById('gameHistoryBody');
            body.innerHTML = "";
            const start = (currentPage - 1) * 10;
            const pageData = fullHistory.slice(start, start + 10);
            
            pageData.forEach(d => {
                const color = (d.num % 2 === 0) ? '#f44336' : '#4caf50';
                const sizeColor = (d.size === 'Big') ? 'orange' : 'blue';
                body.innerHTML += `<tr>
                    <td>${d.id}</td>
                    <td><span class="num-ball" style="background:${color}">${d.num}</span></td>
                    <td style="color:${sizeColor}; font-weight:bold;">${d.size}</td>
                </tr>`;
            });
            document.getElementById('pgNum').innerText = `${currentPage} / ${Math.ceil(fullHistory.length / 10) || 1}`;
        }

        function movePage(dir) {
            const max = Math.ceil(fullHistory.length / 10);
            if (currentPage + dir >= 1 && currentPage + dir <= max) {
                currentPage += dir; renderTable();
            }
        }

        setInterval(updateClock, 1000);
        loadRealtimeData();
    </script>
</body>
</html>
