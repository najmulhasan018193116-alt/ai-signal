<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX Win - Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dx-gold: #ffc107; --dx-bg: #f7f8fc; --big: #ff9800; --small: #2196f3; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body { background: var(--dx-bg); overflow-x: hidden; }

        .header { background: linear-gradient(135deg, var(--dx-gold), #ffdb70); padding: 30px 20px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        .tabs { display: flex; gap: 8px; padding: 15px; background: #fff; margin: 10px; border-radius: 15px; }
        .tab { flex: 1; padding: 10px; background: #f0f1f7; border-radius: 10px; text-align: center; cursor: pointer; font-size: 12px; }
        .tab.active { background: var(--dx-gold); font-weight: bold; }

        .info-card { margin: 10px; padding: 15px; background: #fff; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .controls { display: flex; gap: 10px; padding: 15px; position: relative; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-big { background: var(--big); } .btn-small { background: var(--small); }

        /* Custom Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        
        /* Win/Loss Popup */
        #resultPopup { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 20px 40px; border-radius: 50px; color: #fff; font-weight: bold; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* History & Pagination */
        .table-container { background: #fff; border-radius: 10px; overflow: hidden; margin: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f1f1; }
        .pagination { display: flex; justify-content: center; gap: 15px; padding: 10px; align-items: center; }
        .page-btn { padding: 5px 15px; background: #eee; border-radius: 5px; cursor: pointer; }

        .res-num-ball { width: 22px; height: 22px; border-radius: 50%; display: inline-block; color: #fff; line-height: 22px; font-weight: bold; }
        .history-trigger { position: fixed; right: 0; top: 50%; background: var(--dx-gold); padding: 15px 10px; border-radius: 20px 0 0 20px; cursor: pointer; z-index: 100; font-weight: bold; }
        .side-panel { position: fixed; right: -100%; top: 0; width: 85%; height: 100%; background: #fff; z-index: 200; transition: 0.4s; padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.2); }
        .side-panel.open { right: 0; }
    </style>
</head>
<body>

    <div id="resultPopup"></div>

    <div class="header">
        <p>Wallet Balance</p>
        <h2>৳ <span id="balance">0.00</span></h2>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="setMode(30)">30s</div>
        <div class="tab" onclick="setMode(60)">1m</div>
        <div class="tab" onclick="setMode(180)">3m</div>
        <div class="tab" onclick="setMode(300)">5m</div>
    </div>

    <div class="info-card">
        <div><p style="color: #888;">Period ID</p><h4 id="periodId">Loading...</h4></div>
        <div class="timer-box"><p style="color: #888; text-align: right;">Time Left</p><h3 id="timer">00:00</h3></div>
    </div>

    <div class="controls">
        <div id="waitMsg" style="display:none; position:absolute; inset:0; background:rgba(255,255,255,0.7); z-index:5; align-items:center; justify-content:center; color:red; font-weight:bold;">Betting Closed</div>
        <button class="btn btn-big" onclick="showBetModal('Big')">BIG</button>
        <button class="btn btn-small" onclick="showBetModal('Small')">SMALL</button>
    </div>

    <div class="modal" id="betModal">
        <div class="modal-content">
            <h3 id="modalTitle">Bet on Big</h3>
            <input type="number" id="betAmount" value="100" min="1">
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#ccc; border:none; border-radius:10px;">Cancel</button>
                <button onclick="confirmBet()" style="flex:1; padding:12px; background:var(--dx-gold); border:none; border-radius:10px; font-weight:bold;">Confirm</button>
            </div>
        </div>
    </div>

    <div style="padding: 10px;">
        <h3 style="font-size: 15px; margin: 5px;"><i class="fas fa-list"></i> Game Results</h3>
        <div class="table-container">
            <table id="gameTable">
                <thead><tr><th>Period</th><th>Number</th><th>Size</th></tr></thead>
                <tbody id="gameHistoryBody"></tbody>
            </table>
            <div class="pagination">
                <div class="page-btn" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></div>
                <span id="pageNumber">1 / 1</span>
                <div class="page-btn" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </div>

    <div class="history-trigger" onclick="document.getElementById('sidePanel').classList.add('open')">MY</div>

    <div class="side-panel" id="sidePanel">
        <h3 onclick="document.getElementById('sidePanel').classList.remove('open')" style="cursor:pointer; color:red; margin-bottom:20px;">× Close History</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>Period</th><th>Choice</th><th>Amt</th><th>Status</th></tr></thead>
                <tbody id="myHistoryBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem("userPhone") || "guest_user";

        let currentMode = 30;
        let selectedChoice = "";
        let currentPage = 1;
        let allHistoryData = [];

        // Balance Sync
        db.ref('users/' + user + '/balance').on('value', s => {
            document.getElementById('balance').innerText = parseFloat(s.val() || 0).toFixed(2);
        });

        function showBetModal(choice) {
            selectedChoice = choice;
            document.getElementById('modalTitle').innerText = "Bet on " + choice;
            document.getElementById('betModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('betModal').style.display = 'none'; }

        function confirmBet() {
            const amt = parseFloat(document.getElementById('betAmount').value);
            const bal = parseFloat(document.getElementById('balance').innerText);
            if (amt > bal || amt < 1) return alert("Invalid Amount");

            const pid = document.getElementById('periodId').innerText;
            db.ref('users/' + user).update({ balance: bal - amt });
            db.ref('user_bets/' + user).push({
                period: pid, amount: amt, choice: selectedChoice, mode: currentMode, status: "Pending"
            });
            closeModal();
        }

        function updateClock() {
            const now = new Date();
            const totalSec = (now.getMinutes() * 60) + now.getSeconds();
            const remaining = currentMode - (totalSec % currentMode);
            const pid = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + currentMode + Math.floor(totalSec / currentMode).toString().padStart(3, '0');
            
            document.getElementById('periodId').innerText = pid;
            document.getElementById('timer').innerText = `00:${remaining.toString().padStart(2, '0')}`;
            document.getElementById('waitMsg').style.display = (remaining <= 5) ? 'flex' : 'none';

            if (remaining === currentMode) {
                const prevPid = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + currentMode + (Math.floor(totalSec / currentMode)-1).toString().padStart(3, '0');
                processResult(prevPid);
            }
        }

        function processResult(pid) {
            const num = Math.floor(Math.random() * 10);
            const size = (num >= 5) ? "Big" : "Small";
            db.ref('history/' + currentMode + '/' + pid).set({ num, size });

            db.ref('user_bets/' + user).orderByChild('period').equalTo(pid).once('value', s => {
                s.forEach(child => {
                    const bet = child.val();
                    if(bet.status === "Pending" && bet.mode == currentMode) {
                        let isWin = bet.choice === size;
                        if(isWin) {
                            // 2% Service Fee logic: Win Amount = Bet * 2 - (Bet * 0.04) roughly 1.96x
                            const winAmt = bet.amount + (bet.amount * 0.98); 
                            db.ref('users/' + user + '/balance').transaction(b => (b || 0) + winAmt);
                            showResultPopup("WINNER! ৳" + winAmt.toFixed(2), "#4caf50");
                        } else {
                            showResultPopup("LOSS", "#f44336");
                        }
                        db.ref('user_bets/' + user + '/' + child.key).update({ status: isWin ? "Win" : "Loss" });
                    }
                });
            });
        }

        function showResultPopup(msg, color) {
            const p = document.getElementById('resultPopup');
            p.innerText = msg; p.style.backgroundColor = color; p.style.display = 'block';
            setTimeout(() => { p.style.display = 'none'; }, 3000);
        }

        function setMode(m) {
            currentMode = m; currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            syncData();
        }

        function syncData() {
            db.ref('history/' + currentMode).on('value', s => {
                allHistoryData = [];
                s.forEach(c => allHistoryData.push({id: c.key, ...c.val()}));
                allHistoryData.reverse();
                renderHistory();
            });

            db.ref('user_bets/' + user).on('value', s => {
                const body = document.getElementById('myHistoryBody');
                body.innerHTML = "";
                let rows = [];
                s.forEach(c => rows.push(c.val()));
                rows.reverse().forEach(d => {
                    if(d.mode == currentMode) {
                        body.innerHTML += `<tr><td>...${d.period.slice(-3)}</td><td>${d.choice}</td><td>${d.amount}</td><td style="color:${d.status=='Win'?'green':'red'}">${d.status}</td></tr>`;
                    }
                });
            });
        }

        function renderHistory() {
            const body = document.getElementById('gameHistoryBody');
            body.innerHTML = "";
            const start = (currentPage - 1) * 10;
            const pagedData = allHistoryData.slice(start, start + 10);
            
            pagedData.forEach(d => {
                body.innerHTML += `<tr><td>${d.id}</td><td><span class="res-num-ball" style="background:${d.num % 2 === 0 ? 'red':'green'}">${d.num}</span></td><td style="color:${d.size=='Big'?'orange':'blue'}">${d.size}</td></tr>`;
            });
            document.getElementById('pageNumber').innerText = `${currentPage} / ${Math.ceil(allHistoryData.length / 10) || 1}`;
        }

        function changePage(dir) {
            const max = Math.ceil(allHistoryData.length / 10);
            if (currentPage + dir >= 1 && currentPage + dir <= max) {
                currentPage += dir; renderHistory();
            }
        }

        setInterval(updateClock, 1000);
        syncData();
    </script>
</body>
</html>
