<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin Panel - Manage MLM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-add { background: #28a745; color: white; }
        .btn-add:hover { background: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #007bff; color: white; }
        
        .delete-btn { color: #dc3545; cursor: pointer; font-size: 18px; border: none; background: none; }
        .status-active { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> নতুন প্যাকেজ যোগ করুন</h2>
        <input type="text" id="pName" placeholder="প্যাকেজের নাম (যেমন: VIP Gold)">
        <input type="number" id="pPrice" placeholder="প্যাকেজের দাম (৳)">
        <input type="number" id="pDaily" placeholder="প্রতিদিনের ইনকাম (৳)">
        <input type="number" id="pValidity" placeholder="মেয়াদ (দিন)">
        <button class="btn btn-add" onclick="addPackage()">প্যাকেজ সেভ করুন</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-boxes"></i> বর্তমান প্যাকেজসমূহ</h2>
        <table>
            <thead>
                <tr>
                    <th>নাম</th>
                    <th>দাম</th>
                    <th>ইনকাম</th>
                    <th>মেয়াদ</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="pkgTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // আপনার Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    // প্যাকেজ যোগ করার ফাংশন
    function addPackage() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const daily = document.getElementById('pDaily').value;
        const validity = document.getElementById('pValidity').value;

        if (!name || !price || !daily || !validity) {
            alert("সবগুলো ঘর পূরণ করুন!");
            return;
        }

        const pkgRef = database.ref('packages').push();
        pkgRef.set({
            name: name,
            price: parseInt(price),
            daily: parseInt(daily),
            validity: parseInt(validity)
        }).then(() => {
            alert("প্যাকেজটি সফলভাবে যোগ হয়েছে!");
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pDaily').value = '';
            document.getElementById('pValidity').value = '';
        });
    }

    // প্যাকেজ লিস্ট দেখানো
    database.ref('packages').on('value', (snapshot) => {
        const tableBody = document.getElementById('pkgTableBody');
        tableBody.innerHTML = "";
        
        if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
                const pkg = childSnapshot.val();
                const key = childSnapshot.key;
                
                tableBody.innerHTML += `
                    <tr>
                        <td>${pkg.name}</td>
                        <td>৳${pkg.price}</td>
                        <td>৳${pkg.daily}</td>
                        <td>${pkg.validity} দিন</td>
                        <td>
                            <button class="delete-btn" onclick="deletePackage('${key}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        } else {
            tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>কোনো প্যাকেজ পাওয়া যায়নি।</td></tr>";
        }
    });

    // প্যাকেজ ডিলিট করার ফাংশন
    function deletePackage(key) {
        if (confirm("আপনি কি নিশ্চিতভাবে এই প্যাকেজটি মুছে ফেলতে চান?")) {
            database.ref('packages/' + key).remove();
        }
    }
</script>

</body>
</html>
