<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLM Earning - Power Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #121212; color: white; padding-bottom: 80px; }
        .header-card { background: linear-gradient(135deg, #11998e, #38ef7d); padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .container { padding: 0 15px; }
        .package-card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; position: relative; }
        .package-img { width: 80px; height: 80px; border-radius: 12px; overflow: hidden; background: #333; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #38ef7d; }
        .package-info { flex: 1; }
        .package-info h2 { font-size: 18px; color: #38ef7d; margin-bottom: 5px; }
        .package-info p { font-size: 13px; color: #bbb; }
        .price-tag { position: absolute; top: 15px; right: 15px; background: #38ef7d; color: #121212; padding: 2px 10px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .activate-btn { background: #11998e; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .activate-btn:active { transform: scale(0.95); }
        .back-btn { position: absolute; top: 15px; left: 15px; color: white; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header-card">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h3>My Earnings Balance</h3>
        <h1>৳ <span id="userBalance">0.00</span></h1>
    </div>

    <div class="container" id="packageDisplay">
        <p style="text-align: center; color: #888;">Loading available plans...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
            databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // ১. সেশন চেক: ইউজার লগইন না থাকলে ইনডেক্স পেজে পাঠিয়ে দেবে
        const userPhone = localStorage.getItem("userPhone");
        if (!userPhone) {
            alert("Security Alert: Please login first!");
            window.location.replace("index.html");
        }

        // ২. ডাটা লোড ফাংশন (এডমিন প্যানেলের সাথে সরাসরি কানেক্টেড)
        function initApp() {
            // ব্যালেন্স রিয়েল-টাইম আপডেট
            database.ref('users/' + userPhone).on('value', snapshot => {
                const userData = snapshot.val();
                if(userData) {
                    document.getElementById('userBalance').innerText = parseFloat(userData.balance || 0).toFixed(2);
                }
            });

            // প্যাকেজ রিয়েল-টাইম লোড (এডমিন যা সেট করবেন তাই এখানে দেখাবে)
            database.ref('packages').on('value', snapshot => {
                const display = document.getElementById('packageDisplay');
                display.innerHTML = "";
                if(!snapshot.exists()) {
                    display.innerHTML = "<p style='text-align:center; color:#888; margin-top:20px;'>No plans available now.</p>";
                    return;
                }
                snapshot.forEach(child => {
                    const p = child.val();
                    display.innerHTML += `
                        <div class="package-card">
                            <span class="price-tag">৳ ${p.price}</span>
                            <div class="package-img"><i class="fas fa-bolt"></i></div>
                            <div class="package-info">
                                <h2>${p.name}</h2>
                                <p>Daily Income: <b>৳ ${p.daily}</b></p>
                                <p>Validity: <b>${p.validity} Days</b></p>
                                <button class="activate-btn" onclick="buyPackage('${child.key}', ${p.price}, ${p.daily}, ${p.validity})">Activate Now</button>
                            </div>
                        </div>`;
                });
            });

            // প্রতিদিনের অটো-ইনকাম চেক করা
            checkDailyIncome();
        }

        // ৩. প্যাকেজ কেনার লজিক
        window.buyPackage = function(pkgId, price, daily, validity) {
            database.ref('users/' + userPhone).once('value', snapshot => {
                const balance = snapshot.val().balance || 0;
                if(balance >= price) {
                    if(confirm(`আপনি কি ৳ ${price} দিয়ে এই প্ল্যানটি কিনতে চান?`)) {
                        const startTime = Date.now();
                        // ইউজার ব্যালেন্স থেকে টাকা কেটে নেওয়া
                        database.ref('users/' + userPhone).update({ balance: balance - price });
                        // সাবস্ক্রিপশন রেকর্ড সেভ করা
                        database.ref('user_subscriptions/' + userPhone + '/' + pkgId).set({
                            daily_income: daily,
                            last_claim: startTime,
                            expire_time: startTime + (validity * 24 * 60 * 60 * 1000),
                            status: "active"
                        });
                        alert("অভিনন্দন! প্ল্যানটি সফলভাবে একটিভ হয়েছে।");
                    }
                } else {
                    alert("আপনার ব্যালেন্স যথেষ্ট নয়। দয়া করে রিচার্জ করুন।");
                }
            });
        }

        // ৪. অটোমেটিক ইনকাম ক্যালকুলেশন লজিক
        function checkDailyIncome() {
            database.ref('user_subscriptions/' + userPhone).once('value', snapshot => {
                snapshot.forEach(pkg => {
                    const data = pkg.val();
                    const now = Date.now();
                    const oneDay = 24 * 60 * 60 * 1000;

                    // যদি এক্সপায়ার না হয় এবং ২৪ ঘণ্টা পার হয়
                    if (now < data.expire_time && (now - data.last_claim) >= oneDay) {
                        const daysToPay = Math.floor((now - data.last_claim) / oneDay);
                        const totalBonus = daysToPay * data.daily_income;

                        // ইউজারের মূল ব্যালেন্স বাড়ানো
                        database.ref('users/' + userPhone + '/balance').transaction(current => (current || 0) + totalBonus);
                        // শেষ ইনকাম নেওয়ার সময় আপডেট করা
                        database.ref('user_subscriptions/' + userPhone + '/' + pkg.key).update({
                            last_claim: data.last_claim + (daysToPay * oneDay)
                        });
                    }
                });
            });
        }

        // অ্যাপ্লিকেশন চালু করা
        initApp();
    </script>
</body>
</html>
