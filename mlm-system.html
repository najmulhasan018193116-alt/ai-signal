<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLM Earning - Power Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #121212; color: white; padding-bottom: 80px; }
        .header-card { background: linear-gradient(135deg, #11998e, #38ef7d); padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 20px; }
        .container { padding: 0 15px; }
        .package-card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; }
        .package-img { width: 100px; height: 100px; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .package-img img { width: 100%; height: 100%; object-fit: cover; }
        .package-info { flex: 1; }
        .package-info h2 { font-size: 18px; color: #38ef7d; margin-bottom: 5px; }
        .price-tag { font-size: 16px; font-weight: bold; color: #38ef7d; float: right; }
        .activate-btn { background: #11998e; color: white; border: none; padding: 12px; border-radius: 20px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="header-card">
        <h3>Current Account Balance</h3>
        <h1>৳ <span id="userBalance">0.00</span></h1>
    </div>

    <div class="container" id="packageDisplay"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
            databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // সমস্যা সমাধানকারী লাইন: ব্রাউজার থেকে নম্বর খুঁজে বের করা
        const userPhone = localStorage.getItem("userPhone") || localStorage.getItem("loggedUser"); 

        if (!userPhone) {
            alert("Please login first!");
            window.location.href = "login.html"; 
        }

        function loadData() {
            // ইউজারের রিয়েল টাইম ব্যালেন্স লোড করা
            database.ref('users/' + userPhone).on('value', snapshot => {
                const userData = snapshot.val();
                if(userData) {
                    document.getElementById('userBalance').innerText = parseFloat(userData.balance || 0).toFixed(2);
                }
            });

            // এডমিন প্যানেল থেকে প্যাকেজ লোড
            database.ref('packages').on('value', snapshot => {
                const display = document.getElementById('packageDisplay');
                display.innerHTML = "";
                snapshot.forEach(child => {
                    const p = child.val();
                    display.innerHTML += `
                        <div class="package-card">
                            <div class="package-img"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'"></div>
                            <div class="package-info">
                                <span class="price-tag">৳ ${p.price}</span>
                                <h2>${p.name}</h2>
                                <p>Daily Income: <b>৳ ${p.daily}</b></p>
                                <p>Validity: <b>${p.validity} Days</b></p>
                                <button class="activate-btn" onclick="buyPackage('${child.key}', ${p.price}, ${p.daily}, ${p.validity})">Activate Now</button>
                            </div>
                        </div>`;
                });
            });
        }

        // প্যাকেজ কেনার ফাংশন
        window.buyPackage = function(pkgId, price, daily, validity) {
            database.ref('users/' + userPhone).once('value', snapshot => {
                const balance = snapshot.val() ? snapshot.val().balance : 0;
                if(balance >= price) {
                    if(confirm("Activate this plan for ৳" + price + "?")) {
                        const newBalance = balance - price;
                        const startTime = Date.now();
                        
                        database.ref('users/' + userPhone).update({ balance: newBalance });
                        database.ref('user_subscriptions/' + userPhone + '/' + pkgId).set({
                            daily_income: daily,
                            last_claim: startTime,
                            expire_time: startTime + (validity * 24 * 60 * 60 * 1000)
                        });
                        alert("Activated! Your income will start automatically.");
                    }
                } else {
                    alert("Insufficient Balance! Need ৳" + price);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
