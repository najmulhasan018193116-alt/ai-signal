<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 3 - Refer & Team Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; display: flex; color: #333; }
        
        .sidebar { width: 260px; background: #11998e; height: 100vh; color: white; padding: 25px 15px; position: fixed; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 22px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        .sidebar nav p { padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-size: 15px; }
        .sidebar nav p:hover { background: rgba(255,255,255,0.15); }
        .sidebar nav p.active { background: white; color: #11998e; font-weight: bold; }
        
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        .admin-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }

        h2 { color: #11998e; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; font-size: 16px; }
        .btn-success { background: #11998e; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        th { background: #f8f9fa; color: #11998e; text-transform: uppercase; }
        
        .member-badge { display: block; font-size: 11px; background: #e8f5e9; border: 1px solid #c8e6c9; margin: 3px 0; padding: 4px 10px; border-radius: 5px; color: #2e7d32; }
        .count-badge { background: #11998e; color: white; padding: 3px 12px; border-radius: 50px; font-size: 12px; }
        .money-dep { color: #28a745; font-weight: bold; }
        .money-with { color: #dc3545; font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar h2, .sidebar nav p span { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin VIP 3</h2>
    <nav>
        <p onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> <span>Back to Main</span></p>
        <p class="active"><i class="fas fa-gem"></i> <span>Refer Control</span></p>
        <p onclick="location.reload()"><i class="fas fa-sync"></i> <span>Refresh Data</span></p>
    </nav>
</div>

<div class="main-content">
    
    <div class="admin-card" style="border-top: 5px solid #e91e63;">
        <h2><i class="fas fa-percentage"></i> রেফার কমিশন সেটআপ</h2>
        <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
            <div class="input-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label>পার্সেন্টেজ (%) লিখুন</label>
                <input type="number" id="newRefRate" placeholder="যেমন: 10">
            </div>
            <button class="btn-success" onclick="saveRefRate()">কমিশন সেভ করুন</button>
        </div>
        <div style="margin-top: 15px; padding: 8px 15px; background: #fdf2f5; border-radius: 8px; display: inline-block;">
            বর্তমান রেট: <span id="currentRateDisp" style="font-weight:bold; color:#e91e63;">0</span>%
        </div>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-chart-pie"></i> টিম ট্র্যাকিং ও লেনদেন রিপোর্ট</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">কোন লিডারের টিমে কত ডিপোজিট এবং উইথড্র হয়েছে তার বিস্তারিত তালিকা।</p>
        
        

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>লিডার (ফোন নম্বর)</th>
                        <th>মোট মেম্বার</th>
                        <th>টিম ডিপোজিট</th>
                        <th>টিম উইথড্র</th>
                        <th>মেম্বারদের তালিকা</th>
                    </tr>
                </thead>
                <tbody id="referTrackerBody">
                    <tr><td colspan="5" style="text-align:center; padding: 30px;">ডেটা লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function saveRefRate() {
        const rate = document.getElementById('newRefRate').value;
        if(rate === "" || rate < 0) { alert("সঠিক সংখ্যা দিন!"); return; }
        database.ref('admin_settings/referral').update({ percent: parseFloat(rate) })
        .then(() => { alert("সেভ হয়েছে!"); document.getElementById('newRefRate').value = ""; });
    }

    database.ref('admin_settings/referral/percent').on('value', s => {
        document.getElementById('currentRateDisp').innerText = s.val() || 0;
    });

    function loadReferralTracker() {
        const trackerBody = document.getElementById('referTrackerBody');

        database.ref('users').on('value', snapshot => {
            const allUsers = snapshot.val();
            let teamMap = {}; 

            if(!allUsers) {
                trackerBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>কোনো ডাটা নেই।</td></tr>";
                return;
            }

            // ডেটা প্রসেসিং
            Object.keys(allUsers).forEach(userPhone => {
                const userData = allUsers[userPhone];
                const leaderPhone = userData.referrer;

                if (leaderPhone && leaderPhone !== "None" && leaderPhone !== "") {
                    if (!teamMap[leaderPhone]) {
                        teamMap[leaderPhone] = {
                            members: [],
                            totalDep: 0,
                            totalWith: 0
                        };
                    }
                    // টিমের মেম্বার যোগ করা
                    teamMap[leaderPhone].members.push({
                        phone: userPhone,
                        name: userData.name || 'No Name'
                    });
                    // মেম্বারের ডিপোজিট ও উইথড্র যোগ করা
                    teamMap[leaderPhone].totalDep += parseFloat(userData.totalDeposit || 0);
                    teamMap[leaderPhone].totalWith += parseFloat(userData.totalWithdraw || 0);
                }
            });

            let html = "";
            let hasTeams = false;

            for (let leaderPhone in teamMap) {
                hasTeams = true;
                const leaderData = allUsers[leaderPhone];
                const leaderName = leaderData ? leaderData.name : "Unknown";
                const team = teamMap[leaderPhone];
                
                const memberListHtml = team.members.map(m => `
                    <span class="member-badge"><i class="fas fa-user"></i> ${m.phone} (${m.name})</span>
                `).join("");

                html += `
                    <tr>
                        <td>
                            <b style="color:#11998e;">${leaderPhone}</b><br>
                            <small>${leaderName}</small>
                        </td>
                        <td style="text-align:center;"><span class="count-badge">${team.members.length} জন</span></td>
                        <td class="money-dep">৳ ${team.totalDep.toFixed(2)}</td>
                        <td class="money-with">৳ ${team.totalWith.toFixed(2)}</td>
                        <td><div style="max-height: 100px; overflow-y:auto;">${memberListHtml}</div></td>
                    </tr>
                `;
            }

            trackerBody.innerHTML = hasTeams ? html : "<tr><td colspan='5' style='text-align:center;'>কোনো টিম পাওয়া যায়নি।</td></tr>";
        });
    }

    window.onload = loadReferralTracker;
</script>

</body>
</html>
