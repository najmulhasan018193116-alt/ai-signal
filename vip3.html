<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 3 Admin - Auto Commission System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f4f7f6; display: flex; color: #333; }
        .sidebar { width: 260px; background: #11998e; height: 100vh; color: white; padding: 25px 15px; position: fixed; }
        .sidebar h2 { font-size: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 20px; }
        .sidebar nav p { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar nav p:hover { background: rgba(255,255,255,0.1); }
        .sidebar nav p.active { background: white; color: #11998e; font-weight: bold; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #11998e; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-action { background: #11998e; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-approve { background: #27ae60; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        .money-dep { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin VIP 3</h2>
    <nav>
        <p onclick="window.location.href='dashboard.html'"><i class="fas fa-th-large"></i> <span>Dashboard</span></p>
        <p class="active"><i class="fas fa-hand-holding-usd"></i> <span>Approve Deposit</span></p>
        <p onclick="location.reload()"><i class="fas fa-sync"></i> <span>Refresh</span></p>
    </nav>
</div>

<div class="main-content">
    <div class="admin-card">
        <h2><i class="fas fa-percentage"></i> কমিশন রেট সেটআপ (%)</h2>
        <div class="input-row">
            <div class="input-group"><label>Level 1 (%)</label><input type="number" id="l1" placeholder="10"></div>
            <div class="input-group"><label>Level 2 (%)</label><input type="number" id="l2" placeholder="5"></div>
            <div class="input-group"><label>Level 3 (%)</label><input type="number" id="l3" placeholder="2"></div>
        </div>
        <button class="btn-action" onclick="saveRates()">সেভ করুন</button>
    </div>

    <div class="admin-card" style="border-left: 5px solid #27ae60;">
        <h2><i class="fas fa-user-plus"></i> ব্যালেন্স এড ও কমিশন বন্টন</h2>
        <div class="input-row">
            <div class="input-group"><label>ইউজার নম্বর</label><input type="text" id="uPhone" placeholder="017xxxxxxxx"></div>
            <div class="input-group"><label>টাকার পরিমাণ</label><input type="number" id="uAmount" placeholder="500"></div>
        </div>
        <button class="btn-action btn-approve" onclick="approveAndPay()">এপ্রুভ করুন (কমিশনসহ)</button>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-history"></i> টিমের সর্বশেষ অবস্থা</h2>
        <table>
            <thead>
                <tr>
                    <th>লিডার</th>
                    <th>মেম্বার সংখ্যা</th>
                    <th>টিম ডিপোজিট</th>
                    <th>টিম উইথড্র</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ১. কমিশন রেট সেভ
    function saveRates() {
        db.ref('admin_settings/referral_rates').set({
            level1: parseFloat(document.getElementById('l1').value || 0),
            level2: parseFloat(document.getElementById('l2').value || 0),
            level3: parseFloat(document.getElementById('l3').value || 0)
        }).then(() => alert("Rates Saved!"));
    }

    // রেট লোড
    db.ref('admin_settings/referral_rates').on('value', s => {
        const d = s.val();
        if(d) { document.getElementById('l1').value = d.level1; document.getElementById('l2').value = d.level2; document.getElementById('l3').value = d.level3; }
    });

    // ২. মেইন এপ্রুভ ও কমিশন বন্টন ফাংশন
    async function approveAndPay() {
        const phone = document.getElementById('uPhone').value.trim();
        const amount = parseFloat(document.getElementById('uAmount').value);

        if(!phone || isNaN(amount)) { alert("সঠিক তথ্য দিন!"); return; }

        try {
            // ইউজারের ডাটা এবং রেট আনা
            const ratesSnap = await db.ref('admin_settings/referral_rates').once('value');
            const rates = ratesSnap.val() || { level1: 0, level2: 0, level3: 0 };
            
            const userSnap = await db.ref('users/' + phone).once('value');
            if(!userSnap.exists()) { alert("ইউজার পাওয়া যায়নি!"); return; }
            const userData = userSnap.val();

            // ৩. ইউজারের ব্যালেন্স এড
            await db.ref('users/' + phone).update({
                balance: (parseFloat(userData.balance || 0) + amount),
                totalDeposit: (parseFloat(userData.totalDeposit || 0) + amount)
            });

            // ৪. ৩ স্তরের কমিশন চেইন বন্টন
            let currentReferrer = userData.referrerID; // ১ম আপলাইন

            for(let i = 1; i <= 3; i++) {
                if(!currentReferrer || currentReferrer === "none" || currentReferrer === "") break;

                const leaderSnap = await db.ref('users/' + currentReferrer).once('value');
                const leaderData = leaderSnap.val();

                if(leaderData) {
                    const percent = rates['level' + i] || 0;
                    const commission = (amount * percent) / 100;

                    if(commission > 0) {
                        await db.ref('users/' + currentReferrer).update({
                            balance: (parseFloat(leaderData.balance || 0) + commission),
                            totalCommission: (parseFloat(leaderData.totalCommission || 0) + commission)
                        });
                    }
                    // পরবর্তী লেভেলের লিডার সেট করা (যিনি এই লিডারকে রেফার করেছেন)
                    currentReferrer = leaderData.referrerID;
                } else { break; }
            }

            alert("সফল হয়েছে! ব্যালেন্স এড এবং কমিশন বন্টন সম্পন্ন।");
            document.getElementById('uPhone').value = "";
            document.getElementById('uAmount').value = "";

        } catch (e) { alert("Error: " + e.message); }
    }

    // ৫. রিপোর্ট টেবিল আপডেট
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let reports = {};
        if(!users) return;

        Object.keys(users).forEach(p => {
            const u = users[p];
            const boss = u.referrerID;
            if(boss && boss !== "none" && users[boss]) {
                if(!reports[boss]) reports[boss] = { count: 0, dep: 0, with: 0 };
                reports[boss].count++;
                reports[boss].dep += parseFloat(u.totalDeposit || 0);
                reports[boss].with += parseFloat(u.totalWithdraw || 0);
            }
        });

        let html = "";
        Object.keys(reports).forEach(leader => {
            const r = reports[leader];
            html += `<tr>
                <td><b>${leader}</b></td>
                <td>${r.count} জন</td>
                <td class="money-dep">৳ ${r.dep.toFixed(2)}</td>
                <td style="color:red">৳ ${r.with.toFixed(2)}</td>
            </tr>`;
        });
        document.getElementById('reportTable').innerHTML = html;
    });
</script>

</body>
                                                         </html>
