<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Package Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        
        .container { max-width: 800px; margin: auto; }
        .back-btn { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #11998e; font-weight: bold; }
        
        .admin-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; border-left: 4px solid #11998e; padding-left: 10px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #666; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-success { background: #11998e; color: white; width: 100%; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        th { background: #f8f9fa; color: #666; }
        .pkg-img-preview { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Admin Panel</a>

    <div class="admin-card">
        <h2><i class="fas fa-plus-circle"></i> Add New VIP Plan</h2>
        <div class="input-grid">
            <div class="input-group"><label>Plan Name (e.g. Plan P-1)</label><input type="text" id="pName"></div>
            <div class="input-group"><label>Package Price (৳)</label><input type="number" id="pPrice"></div>
            <div class="input-group"><label>Daily Income (৳)</label><input type="number" id="pDaily"></div>
            <div class="input-group"><label>Total Return (৳)</label><input type="number" id="pTotal"></div>
            <div class="input-group"><label>Validity (Days)</label><input type="number" id="pValidity"></div>
            <div class="input-group"><label>Image URL (Link)</label><input type="text" id="pImg" placeholder="https://image-link.com/img.jpg"></div>
        </div>
        <button class="btn btn-success" onclick="savePackage()">Add Package</button>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-list"></i> Current VIP Plans</h2>
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Plan</th>
                    <th>Price</th>
                    <th>Daily</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="packageTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Firebase Config (Ensure this matches your admin.html)
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        authDomain: "ai-signal-75e73.firebaseapp.com",
        projectId: "ai-signal-75e73",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Function to Add Package to Firebase
    function savePackage() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const daily = document.getElementById('pDaily').value;
        const total = document.getElementById('pTotal').value;
        const validity = document.getElementById('pValidity').value;
        const img = document.getElementById('pImg').value;

        if(!name || !price || !daily || !img) {
            alert("Please fill all fields!");
            return;
        }

        const pkgData = {
            name: name,
            price: price,
            daily: daily,
            total: total,
            validity: validity,
            img: img,
            timestamp: Date.now()
        };

        database.ref('packages').push(pkgData).then(() => {
            alert("Package Added Successfully!");
            // Clear inputs
            document.querySelectorAll('input').forEach(input => input.value = "");
        });
    }

    // Load and Display Packages
    database.ref('packages').on('value', snapshot => {
        const tbody = document.getElementById('packageTableBody');
        tbody.innerHTML = "";
        
        snapshot.forEach(child => {
            const p = child.val();
            tbody.innerHTML += `
                <tr>
                    <td><img src="${p.img}" class="pkg-img-preview" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td><b>${p.name}</b></td>
                    <td>৳ ${p.price}</td>
                    <td>৳ ${p.daily}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deletePackage('${child.key}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    });

    // Delete Package Function
    function deletePackage(id) {
        if(confirm("Are you sure you want to delete this plan?")) {
            database.ref('packages/' + id).remove();
        }
    }
</script>

</body>
</html>
