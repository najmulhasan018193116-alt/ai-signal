<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Premium Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: #f0f7f4;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* প্রোফাইল হেডার */
        .header-gradient {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            height: 220px;
            padding: 30px 20px;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.2);
        }

        .user-icon-circle {
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }

        .user-acc-no { font-size: 14px; opacity: 0.9; margin-top: 5px; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; }

        /* ব্যালেন্স কার্ড */
        .balance-card {
            background: white;
            width: 90%;
            margin: -50px auto 25px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .balance-label { color: #888; font-size: 14px; font-weight: 600; }
        .balance-amount { font-size: 36px; font-weight: 800; color: #333; margin: 5px 0; }

        /* বাটন লিস্ট ডিজাইন */
        .button-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            background: white;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .action-btn:active { transform: scale(0.97); background: #f9f9f9; }

        .btn-icon {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            margin-right: 15px;
        }

        /* বাটন কালার */
        .bg-deposit { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .bg-withdraw { background: linear-gradient(135deg, #f09819, #edde5d); }
        .bg-profile { background: linear-gradient(135deg, #6a11cb, #2575fc); }
        .bg-support { background: linear-gradient(135deg, #38ef7d, #11998e); }
        .bg-signout { background: linear-gradient(135deg, #FF512F, #DD2476); }

        .chevron { margin-left: auto; color: #ccc; font-size: 14px; }

        /* নিচের মেনুবার */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-around;
            background: white; padding: 12px 0;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .nav-link { text-align: center; color: #aaa; text-decoration: none; flex: 1; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-link span { font-size: 12px; font-weight: 600; }
        .nav-link.active { color: #00b09b; }
    </style>
</head>
<body>

    <div class="header-gradient">
        <div class="user-icon-circle"><i class="fas fa-user-circle"></i></div>
        <h2 id="userName">স্বাগতম!</h2>
        <div class="user-acc-no">অ্যাকাউন্ট: <span id="userPhoneDisplay">Loading...</span></div>
    </div>

    <div class="balance-card">
        <div class="balance-label">মোট ব্যালেন্স</div>
        <div class="balance-amount">৳ <span id="userBalance">0.00</span></div>
    </div>

    <div class="button-list">
        
        <a href="deposit.html" class="action-btn">
            <div class="btn-icon bg-deposit"><i class="fas fa-wallet"></i></div>
            <span>Deposit</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="withdraw.html" class="action-btn">
            <div class="btn-icon bg-withdraw"><i class="fas fa-money-bill-transfer"></i></div>
            <span>Withdraw</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="profile.html" class="action-btn">
            <div class="btn-icon bg-profile"><i class="fas fa-user-edit"></i></div>
            <span>Profile Settings</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="support.html" class="action-btn">
            <div class="btn-icon bg-support"><i class="fas fa-headset"></i></div>
            <span>Customer Support</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="javascript:void(0)" class="action-btn" onclick="handleLogout()" style="margin-top: 10px; border-color: #ffccd2;">
            <div class="btn-icon bg-signout"><i class="fas fa-sign-out-alt"></i></div>
            <span style="color: #DD2476;">Sign Out</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
        
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link"><i class="fas fa-th-large"></i><span>Home</span></a>
        <a href="activity.html" class="nav-link"><i class="fas fa-history"></i><span>Activity</span></a>
        <a href="promotion.html" class="nav-link"><i class="fas fa-gift"></i><span>Promotion</span></a>
        <a href="account.html" class="nav-link active"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </div>

    <script>
        window.onload = function() {
            const loggedUser = localStorage.getItem("loggedUser");
            if (loggedUser) {
                document.getElementById("userPhoneDisplay").innerText = loggedUser;
                document.getElementById("userBalance").innerText = "0.00";
            } else {
                window.location.replace("index.html");
            }
        };

        function handleLogout() {
            if(confirm("আপনি কি নিশ্চিতভাবে লগআউট করতে চান?")) {
                localStorage.clear();
                window.location.replace("index.html");
            }
        }
    </script>

</body>
</html>
