<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Premium Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(180deg, #f0f7f4 0%, #e2ebf0 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* প্রোফাইল হেডার */
        .header-gradient {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            height: 260px;
            padding: 30px 20px;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 15px 30px rgba(17, 153, 142, 0.3);
            position: relative;
        }

        /* প্রোফাইল ইমেজ সেকশন */
        .profile-upload-container {
            position: relative;
            width: 95px; height: 95px;
            margin: 0 auto 10px;
        }

        .user-pic {
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px;
            overflow: hidden;
            object-fit: cover;
            cursor: pointer;
        }

        .cam-icon {
            position: absolute;
            bottom: 5px; right: 5px;
            background: white; color: #11998e;
            width: 25px; height: 25px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .welcome-text { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 15px; }

        /* আইডি সেকশন এক সাইডে (বাম দিকে) */
        .id-bar-wrapper {
            display: flex;
            justify-content: flex-start;
            padding-left: 10px;
        }

        .id-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px 15px;
            border-radius: 12px;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .user-acc-no { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; opacity: 0.9; }

        .copy-btn {
            background: #fff; color: #11998e; border: none;
            width: 26px; height: 26px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:active { transform: scale(0.9); }

        /* ব্যালেন্স কার্ড */
        .balance-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 90%;
            margin: -40px auto 25px;
            padding: 22px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid white;
        }

        .balance-label { color: #777; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 35px; font-weight: 800; color: #2d3436; margin-top: 5px; }

        /* অ্যাকশন বাটন লিস্ট */
        .button-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }

        .action-btn {
            background: white;
            display: flex; align-items: center;
            padding: 16px 18px;
            border-radius: 18px;
            text-decoration: none; color: #444;
            font-weight: 600; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .btn-icon {
            width: 45px; height: 45px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white; margin-right: 15px;
        }

        .bg-deposit { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .bg-withdraw { background: linear-gradient(135deg, #ff9966, #ff5e62); }
        .bg-profile { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .bg-support { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .bg-signout { background: linear-gradient(135deg, #e53935, #e35d5b); }

        .chevron { margin-left: auto; color: #ddd; font-size: 13px; }

        /* বটম নেভিগেশন */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-around;
            background: white; padding: 15px 0;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-link { text-align: center; color: #cbd5e0; text-decoration: none; flex: 1; font-size: 20px; }
        .nav-link.active { color: #11998e; }

        /* ইনপুট ফাইল লুকানো */
        #profileInput { display: none; }
    </style>
</head>
<body>

    <div class="header-gradient">
        <div class="profile-upload-container" onclick="document.getElementById('profileInput').click()">
            <div class="user-pic" id="profileDisplay">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="cam-icon"><i class="fas fa-camera"></i></div>
        </div>
        <input type="file" id="profileInput" accept="image/*" onchange="uploadImage(this)">

        <h2 class="welcome-text" id="userName">স্বাগতম!</h2>
        
        <div class="id-bar-wrapper">
            <div class="id-container">
                <span class="user-acc-no">ID: <span id="userPhoneDisplay">*****</span></span>
                <button class="copy-btn" onclick="copyUserID()" title="Copy ID">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="balance-card">
        <div class="balance-label">স্মার্ট ব্যালেন্স</div>
        <div class="balance-amount">৳ <span id="userBalanceDisplay">0.00</span></div>
    </div>

    <div class="button-list">
        <a href="deposit.html" class="action-btn">
            <div class="btn-icon bg-deposit"><i class="fas fa-wallet"></i></div>
            <span>Deposit</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
        <a href="withdraw.html" class="action-btn">
            <div class="btn-icon bg-withdraw"><i class="fas fa-money-bill-transfer"></i></div>
            <span>Withdraw</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
        <a href="profile.html" class="action-btn">
            <div class="btn-icon bg-profile"><i class="fas fa-user-edit"></i></div>
            <span>Profile Settings</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
        <a href="support.html" class="action-btn">
            <div class="btn-icon bg-support"><i class="fas fa-headset"></i></div>
            <span>Customer Support</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
        <a href="javascript:void(0)" class="action-btn" onclick="handleLogout()" style="margin-top: 5px;">
            <div class="btn-icon bg-signout"><i class="fas fa-sign-out-alt"></i></div>
            <span style="color: #e53935;">Sign Out</span>
            <i class="fas fa-chevron-right chevron"></i>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link"><i class="fas fa-th-large"></i></a>
        <a href="activity.html" class="nav-link"><i class="fas fa-history"></i></a>
        <a href="promotion.html" class="nav-link"><i class="fas fa-gift"></i></a>
        <a href="account.html" class="nav-link active"><i class="fas fa-user-circle"></i></a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
          authDomain: "ai-signal-75e73.firebaseapp.com",
          projectId: "ai-signal-75e73",
          databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        let fullUserID = "";

        window.onload = function() {
            const loggedUser = localStorage.getItem("loggedUser");
            if (loggedUser) {
                fullUserID = loggedUser;
                const lastFive = loggedUser.slice(-5);
                document.getElementById("userPhoneDisplay").innerText = "******" + lastFive;
                
                // সেভ করা ছবি থাকলে লোড করা
                const savedImg = localStorage.getItem("userProfilePic");
                if(savedImg) {
                    document.getElementById("profileDisplay").innerHTML = `<img src="${savedImg}" style="width:100%;height:100%;">`;
                }

                fetchBalance();
            } else {
                window.location.replace("index.html");
            }
        };

        // ছবি আপলোড এবং প্রিভিউ ফাংশন
        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgTag = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                    document.getElementById("profileDisplay").innerHTML = imgTag;
                    // লোকাল স্টোরেজে সেভ করা (স্থায়ী করার জন্য ফায়ারবেস স্টোরেজ ব্যবহার করা ভালো)
                    localStorage.setItem("userProfilePic", e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function fetchBalance() {
            database.ref('users/balance').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const balance = snapshot.val();
                    document.getElementById('userBalanceDisplay').innerText = parseFloat(balance).toFixed(2);
                }
            });
        }

        function copyUserID() {
            if (fullUserID) {
                navigator.clipboard.writeText(fullUserID).then(() => {
                    alert("ID Copied: " + fullUserID);
                });
            }
        }

        function handleLogout() {
            if(confirm("লগআউট করতে চান?")) {
                localStorage.clear();
                window.location.replace("index.html");
            }
        }
    </script>
</body>
</html>
